# Atualiza os dados do Mercado Steam automaticamente, 2x por dia.
# Roda o coletor (npm run mercado) e SÓ publica se o resultado for válido E
# diferente do atual. Reaproveita o deploy.yml para colocar o site no ar.
#
# Proteções de segurança embutidas:
#   [1] Permissões mínimas (só escrever no repo e disparar o deploy).
#   [2] Commita apenas o src/data/market.js (nada "de carona").
#   [3] Valida o arquivo antes de publicar — um dia de falha da Steam não
#       deixa lixo ir pro ar; o robô simplesmente não faz nada.
name: Atualiza o Mercado

on:
  schedule:
    # O cron do GitHub roda em UTC. Brasília é UTC-3, então:
    #   11h UTC = 08h Brasília  ·  23h UTC = 20h Brasília.
    # Usamos o minuto :17 (e não :00) porque a hora cheia é congestionada
    # e o GitHub atrasa mais os agendamentos nela.
    - cron: '17 11,23 * * *'
  workflow_dispatch: # permite rodar na mão pelo botão na aba Actions

# [1] Permissões mínimas: só o estritamente necessário.
permissions:
  contents: write # commitar o market.js de volta
  actions: write # disparar o workflow de deploy

# Garante que não rodem duas atualizações ao mesmo tempo.
concurrency:
  group: mercado
  cancel-in-progress: false

jobs:
  atualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Preparar o Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Coletar o Mercado
        run: npm run mercado

      # [3] Trava se o coletor gerou um arquivo vazio/inválido. Conta quantos
      # itens (campo "hash") existem no market.js; zero = aborta antes de publicar.
      - name: Validar o resultado
        run: node -e "const t=require('fs').readFileSync('src/data/market.js','utf8'); const n=(t.match(/\"hash\":/g)||[]).length; if(n===0){console.error('market.js sem itens — abortando'); process.exit(1)} console.log('OK:', n, 'itens')"

      - name: Commitar e publicar só se mudou
        run: |
          if git diff --quiet -- src/data/market.js; then
            echo "Sem mudança no Mercado nesta rodada — nada a fazer."
          else
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add src/data/market.js          # [2] só este arquivo
            git commit -m "Atualiza dados do Mercado (automático)"
            git push
            gh workflow run deploy.yml          # dispara o deploy
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
